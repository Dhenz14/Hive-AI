<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>{% block title %}HiveAI Knowledge Refinery{% endblock %}</title>
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-surface: #12121e;
            --bg-elevated: #1a1a2e;
            --bg-card: #16162a;
            --border: #2a2a44;
            --border-bright: #3a3a5c;
            --amber: #f59e0b;
            --amber-glow: #fbbf24;
            --amber-dim: #b45309;
            --amber-deep: #92400e;
            --cyan: #06b6d4;
            --cyan-glow: #22d3ee;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #22c55e;
            --error: #ef4444;
            --error-dim: #991b1b;
            --purple: #a78bfa;
        }
        @keyframes ambientGlow {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }
        @keyframes borderPulse {
            0% { border-color: var(--border); }
            50% { border-color: var(--amber-dim); }
            100% { border-color: var(--border); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(245, 158, 11, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(6, 182, 212, 0.03) 0%, transparent 50%);
        }
        nav {
            background: rgba(18, 18, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 0;
            height: 56px;
            position: relative;
            z-index: 100;
        }
        nav::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--amber) 30%, var(--amber-glow) 50%, var(--amber) 70%, transparent 100%);
            opacity: 0.5;
        }
        nav .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--amber);
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-right: 2rem;
        }
        nav .logo .hex-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--amber) 0%, var(--amber-deep) 100%);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--bg-deep);
            font-weight: 700;
        }
        nav .logo span { color: var(--text-secondary); font-weight: 500; }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
            padding: 0 1rem;
            height: 56px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        nav a:hover { color: var(--text-primary); }
        nav a.active {
            color: var(--amber);
            border-bottom-color: var(--amber);
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: var(--text-primary);
        }
        h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            position: relative;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--amber-dim), transparent);
            opacity: 0.4;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s;
        }
        .stat-card:hover { border-color: var(--amber-dim); }
        .stat-card .number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--amber);
        }
        .stat-card .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--amber) 0%, var(--amber-dim) 100%);
            color: var(--bg-deep);
            border-color: var(--amber);
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
            transform: translateY(-1px);
        }
        .btn-success {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            color: white;
            border-color: #22c55e;
        }
        .btn-success:hover {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
        .btn-warning {
            background: linear-gradient(135deg, var(--amber) 0%, var(--amber-deep) 100%);
            color: var(--bg-deep);
            border-color: var(--amber-glow);
        }
        .btn-danger {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            border-color: #ef4444;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: var(--amber);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }
        input[type="text"]::placeholder, textarea::placeholder {
            color: var(--text-muted);
        }
        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid;
        }
        .status-queued { background: var(--bg-elevated); color: var(--text-muted); border-color: var(--border); }
        .status-crawling, .status-hive_pinging, .status-generating_queries, .status-chunking {
            background: rgba(245, 158, 11, 0.1); color: var(--amber); border-color: var(--amber-dim);
        }
        .status-reasoning, .status-reasoned, .status-writing {
            background: rgba(167, 139, 250, 0.1); color: var(--purple); border-color: rgba(167, 139, 250, 0.3);
        }
        .status-review { background: rgba(245, 158, 11, 0.15); color: var(--amber-glow); border-color: var(--amber); }
        .status-published { background: rgba(34, 197, 94, 0.1); color: var(--success); border-color: rgba(34, 197, 94, 0.3); }
        .status-error { background: rgba(239, 68, 68, 0.1); color: var(--error); border-color: var(--error-dim); }
        .status-hive_pinged, .status-crawled, .status-chunked {
            background: rgba(6, 182, 212, 0.1); color: var(--cyan); border-color: rgba(6, 182, 212, 0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-bright);
        }
        td a { color: var(--amber); text-decoration: none; }
        td a:hover { text-decoration: underline; color: var(--amber-glow); }
        .empty { color: var(--text-muted); text-align: center; padding: 2rem; font-style: italic; }
        #health-bar {
            background: var(--bg-deep);
            border-bottom: 1px solid var(--border);
            padding: 0.3rem 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
        }
        .health-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }
        .health-dot.online { background: var(--success); }
        .health-dot.offline { background: var(--error); }
        .health-dot.busy { background: var(--amber); animation: borderPulse 1.5s ease-in-out infinite; }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <div class="hex-icon">H</div>
            Hive<span>AI</span>
        </a>
        <a href="/">Dashboard</a>
        <a href="/chat">Chat</a>
        <a href="/graph">Knowledge Graph</a>
        <a href="/forge">Forge</a>
        <a href="/eval">Eval Arena</a>
    </nav>
    <div id="health-bar">
        <span><span class="health-dot" id="hb-llm-dot"></span> LLM: <span id="hb-llm-text">&mdash;</span></span>
        <span><span class="health-dot" id="hb-embed-dot"></span> Embeddings: <span id="hb-embed-text">&mdash;</span></span>
        <span>GPU: <span id="hb-gpu-text">&mdash;</span></span>
        <span>Training: <span id="hb-train-text">idle</span></span>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
    // System health bar — polls every 30s
    async function updateHealthBar() {
        // LLM status
        try {
            const r = await fetch('/api/llm-status');
            const d = await r.json();
            document.getElementById('hb-llm-dot').className = 'health-dot ' + (d.online ? 'online' : 'offline');
            document.getElementById('hb-llm-text').textContent = d.online ? 'Online' : 'Offline';
        } catch(e) {
            document.getElementById('hb-llm-dot').className = 'health-dot offline';
            document.getElementById('hb-llm-text').textContent = '\u2014';
        }

        // Embedding status
        try {
            const r = await fetch('/api/embedding-status');
            const d = await r.json();
            document.getElementById('hb-embed-dot').className = 'health-dot ' + (d.online ? 'online' : 'offline');
            document.getElementById('hb-embed-text').textContent = d.online ? 'Online' : 'Offline';
        } catch(e) {
            document.getElementById('hb-embed-dot').className = 'health-dot offline';
            document.getElementById('hb-embed-text').textContent = '\u2014';
        }

        // GPU
        try {
            const r = await fetch('/api/hardware');
            const d = await r.json();
            if (d.gpu_used_mb !== undefined && d.gpu_total_mb !== undefined) {
                const used = (d.gpu_used_mb / 1024).toFixed(1);
                const total = (d.gpu_total_mb / 1024).toFixed(1);
                document.getElementById('hb-gpu-text').textContent = used + '/' + total + ' GB';
            }
        } catch(e) {
            document.getElementById('hb-gpu-text').textContent = '\u2014';
        }

        // Training
        try {
            const r = await fetch('/api/lora/training-status');
            const d = await r.json();
            if (d.active) {
                const text = d.step && d.total_steps
                    ? 'Step ' + d.step + '/' + d.total_steps
                    : d.stage || 'Active';
                document.getElementById('hb-train-text').textContent = text;
                document.getElementById('hb-train-text').style.color = 'var(--amber)';
            } else {
                document.getElementById('hb-train-text').textContent = 'idle';
                document.getElementById('hb-train-text').style.color = '';
            }
        } catch(e) {
            document.getElementById('hb-train-text').textContent = '\u2014';
        }
    }

    updateHealthBar();
    setInterval(updateHealthBar, 30000);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
