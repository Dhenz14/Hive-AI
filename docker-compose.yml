# =============================================================================
# HiveAI Knowledge Refinery — Docker Compose
# =============================================================================
# One-command deployment: docker compose up
#
# Services:
#   hiveai  — Flask web app (port 5001)
#   ollama  — Local LLM server (port 11434)
#
# For GPU-accelerated Ollama, ensure NVIDIA Container Toolkit is installed:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
# =============================================================================

services:
  hiveai:
    build: .
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - PORT=5001
      - PRODUCTION=1
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=sqlite:///data/hiveai.db
    volumes:
      - hiveai-data:/app/data
      - ./loras:/app/loras
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  hiveai-data:
  ollama-models:
