# Spirit Bomb Community Cloud — Docker Compose
#
# Three deployment modes:
#
#   1. SINGLE MACHINE (default):
#      docker compose -f docker-compose.spiritbomb.yml up
#
#   2. MULTI-MACHINE HEAD NODE (runs vLLM head + coordinator):
#      SPIRITBOMB_MODE=head docker compose -f docker-compose.spiritbomb.yml up
#
#   3. MULTI-MACHINE WORKER (joins an existing head node):
#      RAY_HEAD_ADDRESS=192.168.1.100:6379 docker compose -f docker-compose.spiritbomb.yml up vllm-worker
#
# Requirements:
#   - NVIDIA Container Toolkit (nvidia-docker2)
#   - CUDA 12.1+ driver
#   - HuggingFace model pre-downloaded or HF_TOKEN set

services:
  # ── vLLM Head Node — serves OpenAI-compatible API ──────────────
  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8100:8000"     # OpenAI API
      - "6379:6379"     # Ray head port (for multi-machine)
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - VLLM_LOGGING_LEVEL=INFO
    volumes:
      - hf_cache:/root/.cache/huggingface
    command: >
      --model ${SPIRITBOMB_MODEL:-Qwen/Qwen3-14B-AWQ}
      --quantization ${SPIRITBOMB_QUANTIZATION:-awq}
      --tensor-parallel-size ${SPIRITBOMB_TP_SIZE:-1}
      --pipeline-parallel-size ${SPIRITBOMB_PP_SIZE:-1}
      --gpu-memory-utilization 0.90
      --max-model-len ${SPIRITBOMB_MAX_CTX:-32768}
      --enable-chunked-prefill
      --enable-prefix-caching
      --host 0.0.0.0
      --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    restart: unless-stopped

  # ── vLLM Worker Node — joins a multi-machine cluster ───────────
  # Only needed for multi-machine setup. Connects to head via Ray.
  #
  # Usage: RAY_HEAD_ADDRESS=HEAD_IP:6379 docker compose up vllm-worker
  vllm-worker:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - RAY_HEAD_ADDRESS=${RAY_HEAD_ADDRESS:-}
    volumes:
      - hf_cache:/root/.cache/huggingface
    entrypoint: >
      bash -c "
        if [ -z \"$RAY_HEAD_ADDRESS\" ]; then
          echo 'ERROR: Set RAY_HEAD_ADDRESS=HEAD_IP:6379 to join a cluster'
          exit 1
        fi
        echo 'Joining Ray cluster at $RAY_HEAD_ADDRESS...'
        ray start --address=$RAY_HEAD_ADDRESS --block
      "
    profiles:
      - multi-machine  # only starts with: docker compose --profile multi-machine up
    restart: unless-stopped

  # ── Community Coordinator ──────────────────────────────────────
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SPIRITBOMB_API_KEY=${SPIRITBOMB_API_KEY:-}
      - HIVEPOA_URL=${HIVEPOA_URL:-http://host.docker.internal:5000}
    command: >
      python scripts/run_coordinator.py
      --hivepoa-url ${HIVEPOA_URL:-http://host.docker.internal:5000}
      --api-key ${SPIRITBOMB_API_KEY:-}
    depends_on:
      vllm:
        condition: service_healthy
    restart: unless-stopped

  # ── Ping Server (latency probing) ──────────────────────────────
  ping-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8101:8101"
    command: >
      python -c "
      from aiohttp import web;
      async def ping(r): return web.Response(body=await r.read());
      async def health(r): return web.json_response({'healthy': True});
      app = web.Application();
      app.router.add_post('/ping', ping);
      app.router.add_get('/health', health);
      web.run_app(app, host='0.0.0.0', port=8101)
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  hf_cache:
    driver: local
